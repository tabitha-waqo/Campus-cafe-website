<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Campus Café</title>
    <style>
        :root {
            --bg-primary: #fdfbf7;--bg-secondary: #f4efe6;--accent-dark: #2c4a3e;--accent-light: #4a7c66;--text-dark: #1e2d27;--text-muted: #5c6b64;--white: #ffffff;--gold: #dfa837;--shadow: 0 8px 24px rgba(0, 0, 0, 0.05);--transition: all 0.3s ease;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--bg-primary); color: var(--text-dark); line-height: 1.6; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 2rem; }
        .text-center { text-align: center; }

        /* --- STICKY NAV AND ALERTS --- */
        .top-bar { background-color: var(--accent-dark); color: var(--white); font-size: 0.85rem; padding: 0.6rem 0; font-weight: 500; }
        .top-bar-flex { display: flex; justify-content: space-between; align-items: center; }
        
        header { background-color: var(--white); box-shadow: var(--shadow); position: sticky; top: 0; z-index: 999; padding: 1.2rem 0; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; }
        header h1 { color: var(--accent-dark); font-size: 1.75rem; font-weight: 800; }
        nav { display: flex; gap: 1.5rem; }
        nav a { text-decoration: none; color: var(--text-muted); font-weight: 500; }
        nav a.active { color: var(--accent-dark); font-weight: 700; }

        /* --- CONTACT HERO --- */
        .inner-hero { background-color: var(--bg-secondary); padding: 5rem 0; border-bottom: 1px solid rgba(74, 124, 102, 0.1); }
        .inner-hero h2 { font-size: 3rem; color: var(--accent-dark); margin-bottom: 1rem; }
        .inner-hero p { font-size: 1.2rem; color: var(--text-muted); max-width: 600px; margin: 0 auto; }
    </style>
</head>
<body>

<div class="top-bar">
    <div class="container top-bar-flex">
        <span>🎉 Show your student ID for 10% off all espresso drinks!</span>
        <span>📍 Student Union Building, 1st Floor</span>
    </div>
</div>

<header>
    <div class="container header-flex">
        <h1>Campus Café</h1>
        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
    </div>
</header>

<main>
    <section class="inner-hero text-center">
        <div class="container">
            <h2>Get In Touch</h2>
            <p>Have questions, catering requests, or feedback? Drop us a line below or visit our campus branch directly.</p>
        </div>
    </section>

    <div class="container" style="padding: 4rem 0;">
        </div>
</main>

<footer><p>© 2026 Campus Café. All Rights Reserved.</p></footer>

</body>
</html>
